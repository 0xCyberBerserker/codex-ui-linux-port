name: Build Codex UI Linux packages

on:
  workflow_dispatch:
    inputs:
      dmg_url:
        description: "Optional official DMG URL override"
        required: false
        type: string
      version:
        description: "Optional version override"
        required: false
        type: string
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: codex-ui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: tools/package-lock.json

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full nodejs npm jq curl dpkg-dev rpm patch zstd libarchive-tools ripgrep

      - name: Resolve source archive
        id: source
        env:
          DMG_URL_INPUT: ${{ inputs.dmg_url }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${DMG_URL_INPUT:-}" ]; then
            version="${VERSION_INPUT:-}"
            if [ -z "$version" ]; then
              version="$(printf '%s\n' "$DMG_URL_INPUT" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"
            fi
            test -n "$version"
            ext="${DMG_URL_INPUT%%\?*}"
            ext="${ext##*.}"
            case "$ext" in dmg) ;; *) echo "release workflow requires a DMG source" >&2; exit 2 ;; esac
            echo "source_url=$DMG_URL_INPUT" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "source_ext=$ext" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          appcast="$(jq -r '.appcastUrl' VERSION.json)"
          dmg_url="$(jq -r '.dmgUrl' VERSION.json)"
          curl -fsSL "$appcast" -o appcast.xml
          VERSION="$(python3 <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          ns = {"sparkle": "http://www.andymatuschak.org/xml-namespaces/sparkle"}
          root = ET.parse("appcast.xml").getroot()
          for item in root.findall("./channel/item"):
              version = item.findtext("sparkle:shortVersionString", namespaces=ns) or item.findtext("title") or ""
              if version:
                  print(version)
                  sys.exit(0)
          raise SystemExit("no version found in appcast")
          PY
          )"
          echo "source_url=$dmg_url" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_ext=dmg" >> "$GITHUB_OUTPUT"

      - name: Download source archive
        env:
          SOURCE_EXT: ${{ steps.source.outputs.source_ext }}
          SOURCE_URL: ${{ steps.source.outputs.source_url }}
        run: |
          curl -fL "$SOURCE_URL" -o "Codex-source.$SOURCE_EXT"

      - name: Check release freshness
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_EXT: ${{ steps.source.outputs.source_ext }}
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          set -euo pipefail
          source_sha="$(sha256sum "Codex-source.$SOURCE_EXT" | awk '{print $1}')"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          if ! gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"
          rm -rf existing-release
          mkdir -p existing-release
          if gh release download "v$VERSION" --repo "$GITHUB_REPOSITORY" --pattern manifest.json --dir existing-release >/dev/null 2>&1; then
            existing_sha="$(jq -r '.sourceArchiveSha256 // .sourceDmgSha256 // empty' existing-release/manifest.json)"
          else
            existing_sha=""
          fi

          asset_set_complete=false
          if gh release download "v$VERSION" --repo "$GITHUB_REPOSITORY" --pattern checksums.txt --dir existing-release >/dev/null 2>&1; then
            gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' > existing-release/assets.txt
            asset_set_complete=true
            while read -r expected_sha asset_name extra; do
              if [[ ! "$expected_sha" =~ ^[0-9a-f]{64}$ ]] || [ -z "$asset_name" ] || [ -n "${extra:-}" ] || [ "$(basename "$asset_name")" != "$asset_name" ]; then
                asset_set_complete=false
                break
              fi
              if ! grep -Fxq "$asset_name" existing-release/assets.txt; then
                asset_set_complete=false
                break
              fi
              if ! gh release download "v$VERSION" --repo "$GITHUB_REPOSITORY" --pattern "$asset_name" --dir existing-release --clobber >/dev/null 2>&1; then
                asset_set_complete=false
                break
              fi
            done < existing-release/checksums.txt
            if [ "$asset_set_complete" = "true" ] && ! (cd existing-release && sha256sum -c checksums.txt >/dev/null); then
              asset_set_complete=false
            fi
          fi

          if [ "$existing_sha" = "$source_sha" ] && [ "$asset_set_complete" = "true" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        if: steps.freshness.outputs.fresh != 'true'
        env:
          SOURCE_EXT: ${{ steps.source.outputs.source_ext }}
          SOURCE_URL: ${{ steps.source.outputs.source_url }}
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          scripts/build-from-dmg \
            --source "Codex-source.$SOURCE_EXT" \
            --source-url "$SOURCE_URL" \
            --version "$VERSION"

      - name: Validate release artifacts
        if: steps.freshness.outputs.fresh != 'true'
        env:
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          scripts/validate-release-artifacts dist "$VERSION"

      - name: Privacy audit
        if: steps.freshness.outputs.fresh != 'true'
        run: scripts/privacy-audit

      - name: Create release
        if: steps.freshness.outputs.fresh != 'true' && steps.freshness.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f | sort)
          gh release create "v$VERSION" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Codex UI Linux Port $VERSION" \
            --notes "Unofficial automated Linux package build for Codex UI $VERSION."

      - name: Refresh release
        if: steps.freshness.outputs.fresh != 'true' && steps.freshness.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f | sort)
          mapfile -t expected_names < <(printf '%s\n' "${assets[@]}" | xargs -r -n1 basename | sort)
          mapfile -t existing_names < <(gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)
          for existing_name in "${existing_names[@]}"; do
            keep=false
            for expected_name in "${expected_names[@]}"; do
              if [ "$existing_name" = "$expected_name" ]; then
                keep=true
                break
              fi
            done
            if [ "$keep" = "false" ]; then
              gh release delete-asset "v$VERSION" "$existing_name" --repo "$GITHUB_REPOSITORY" --yes
            fi
          done
          gh release upload "v$VERSION" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Codex UI Linux Port $VERSION" \
            --notes "Unofficial automated Linux package build for Codex UI $VERSION. Source archive SHA256: ${{ steps.freshness.outputs.source_sha }}"
