name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          visibility="$(gh repo view "$GITHUB_REPOSITORY" --json visibility --jq .visibility)"
          if [ "$visibility" = "PRIVATE" ]; then
            echo "GitHub Pages is not available for this private repository on the current plan; skipping deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api --method POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/dev/null
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.pages.outputs.available == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload artifact
        if: steps.pages.outputs.available == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy
        if: steps.pages.outputs.available == 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
